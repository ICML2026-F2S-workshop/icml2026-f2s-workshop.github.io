<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c1e"/>
      <stop offset="40%" stop-color="#151839"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6c5ce7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00cec9" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="frameFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3436" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="520" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="0" x2="0" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="840" y1="0" x2="840" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1080" y1="0" x2="1080" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1320" y1="0" x2="1320" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1440" y1="0" x2="1440" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1560" y1="0" x2="1560" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1680" y1="0" x2="1680" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1800" y1="0" x2="1800" y2="520" stroke="#fff" stroke-width="1"/>
    <line x1="1920" y1="0" x2="1920" y2="520" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Film strip - left side (individual frames) -->
  <g opacity="0.25">
    <!-- Film strip body -->
    <rect x="80" y="130" width="440" height="260" rx="6" fill="none" stroke="#6c5ce7" stroke-width="1.5"/>
    <!-- Sprocket holes top -->
    <rect x="95" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="125" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="155" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="185" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="215" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="245" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="275" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="305" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="335" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="365" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="395" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="425" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="455" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="485" y="138" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <!-- Sprocket holes bottom -->
    <rect x="95" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="125" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="155" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="185" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="215" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="245" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="275" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="305" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="335" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="365" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="395" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="425" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="455" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <rect x="485" y="372" width="14" height="10" rx="2" fill="#6c5ce7" opacity="0.5"/>
    <!-- Individual frames inside strip -->
    <rect x="100" y="160" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="200" y="160" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="300" y="160" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="400" y="160" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="100" y="240" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="200" y="240" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="300" y="240" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="400" y="240" width="90" height="60" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="100" y="320" width="90" height="40" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="200" y="320" width="90" height="40" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="300" y="320" width="90" height="40" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
    <rect x="400" y="320" width="90" height="40" rx="3" fill="url(#frameFill)" stroke="#6c5ce7" stroke-width="0.8"/>
  </g>

  <!-- Flowing connection paths from frames to story -->
  <g filter="url(#glow)">
    <path d="M 540 200 C 650 200, 680 170, 750 180 C 820 190, 850 250, 920 240" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.5"/>
    <path d="M 540 260 C 650 260, 700 230, 780 240 C 860 250, 880 280, 960 270" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 540 320 C 650 320, 710 290, 800 300 C 890 310, 910 260, 1000 280" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M 540 180 C 640 170, 730 210, 820 200 C 910 190, 950 230, 1040 220" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.3"/>
    <path d="M 540 340 C 630 350, 750 300, 850 310 C 950 320, 970 280, 1060 290" stroke="url(#accent)" stroke-width="1" fill="none" opacity="0.3"/>
  </g>

  <!-- Story / connected narrative - right side -->
  <g opacity="0.2">
    <!-- Connected story nodes -->
    <circle cx="1450" cy="180" r="25" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1550" cy="220" r="20" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1500" cy="300" r="22" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1600" cy="320" r="18" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1680" cy="260" r="24" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1750" cy="190" r="16" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <circle cx="1780" cy="330" r="20" fill="none" stroke="#00cec9" stroke-width="1.2"/>
    <!-- Connection lines between story nodes -->
    <line x1="1475" y1="185" x2="1530" y2="215" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1540" y1="240" x2="1510" y2="280" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1520" y1="305" x2="1582" y2="318" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1570" y1="225" x2="1656" y2="258" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1618" y1="315" x2="1656" y2="270" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1700" y1="250" x2="1742" y2="198" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <line x1="1700" y1="272" x2="1762" y2="322" stroke="#00cec9" stroke-width="0.8" opacity="0.6"/>
    <!-- Small dots at nodes -->
    <circle cx="1450" cy="180" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1550" cy="220" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1500" cy="300" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1600" cy="320" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1680" cy="260" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1750" cy="190" r="4" fill="#00cec9" opacity="0.4"/>
    <circle cx="1780" cy="330" r="4" fill="#00cec9" opacity="0.4"/>
  </g>

  <!-- Floating particles -->
  <g opacity="0.15">
    <circle cx="180" cy="90" r="2" fill="#6c5ce7"/>
    <circle cx="350" cy="60" r="1.5" fill="#a29bfe"/>
    <circle cx="520" cy="110" r="2" fill="#6c5ce7"/>
    <circle cx="700" cy="80" r="1" fill="#00cec9"/>
    <circle cx="850" cy="130" r="2.5" fill="#6c5ce7"/>
    <circle cx="1050" cy="70" r="1.5" fill="#00cec9"/>
    <circle cx="1200" cy="100" r="2" fill="#a29bfe"/>
    <circle cx="1400" cy="90" r="1" fill="#6c5ce7"/>
    <circle cx="1550" cy="120" r="2" fill="#00cec9"/>
    <circle cx="1700" cy="80" r="1.5" fill="#a29bfe"/>
    <circle cx="250" cy="430" r="2" fill="#6c5ce7"/>
    <circle cx="500" cy="450" r="1.5" fill="#a29bfe"/>
    <circle cx="750" cy="420" r="1" fill="#00cec9"/>
    <circle cx="1000" cy="440" r="2" fill="#6c5ce7"/>
    <circle cx="1300" cy="430" r="1.5" fill="#00cec9"/>
    <circle cx="1600" cy="450" r="2" fill="#a29bfe"/>
    <circle cx="1850" cy="420" r="1" fill="#6c5ce7"/>
  </g>

  <!-- Arrow indication from frames to story -->
  <g filter="url(#softGlow)" opacity="0.15">
    <path d="M 600 260 L 1380 260" stroke="url(#accent)" stroke-width="2" stroke-dasharray="8,6"/>
    <polygon points="1380,252 1400,260 1380,268" fill="#00cec9"/>
  </g>
</svg>
